# Payment Service Configuration
# Phase 3: Core Payments Implementation

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:catalyst_db}?currentSchema=payment
    username: ${DB_USERNAME:catalyst}
    password: ${DB_PASSWORD:catalyst_dev_password}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:catalyst_redis_password}

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: payment
    validate-on-migrate: true

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        interceptor.classes: com.catalyst.shared.infrastructure.logging.CorrelationIdInterceptor
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        isolation.level: read_committed

server:
  port: ${SERVER_PORT:8081}

# Catalyst Configuration (Structured to avoid IDE warnings)
catalyst:
  payment:
    stripe:
      api-key: ${STRIPE_API_KEY:sk_test_your_stripe_secret_key}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret}
      public-key: ${STRIPE_PUBLIC_KEY:pk_test_your_stripe_public_key}

    trial:
      duration-days: ${TRIAL_DURATION_DAYS:14}

    tiers:
      professional:
        monthly-price-id: ${STRIPE_PROFESSIONAL_MONTHLY_PRICE_ID:price_professional_monthly}
        annual-price-id: ${STRIPE_PROFESSIONAL_ANNUAL_PRICE_ID:price_professional_annual}
        monthly-amount: 29.00
        annual-amount: 290.00
      clinic:
        monthly-price-id: ${STRIPE_CLINIC_MONTHLY_PRICE_ID:price_clinic_monthly}
        annual-price-id: ${STRIPE_CLINIC_ANNUAL_PRICE_ID:price_clinic_annual}
        monthly-amount: 99.00
        annual-amount: 990.00

    kafka:
      topics:
        subscription-created: payment.subscription.created
        subscription-activated: payment.subscription.activated
        subscription-canceled: payment.subscription.canceled
        payment-succeeded: payment.succeeded
        payment-failed: payment.failed
        dlq: payment.dlq

  security:
    jwt:
      secret: ${JWT_SECRET:your-256-bit-secret-key-for-development-only}
      access-token-expiration: 15m
      refresh-token-expiration: 7d
      issuer: catalyst-api

    cors:
      allowed-origins:
        - http://localhost:3000

    rate-limit:
      enabled: true
      anonymous:
        requests-per-minute: 30
        burst: 10
      authenticated:
        requests-per-minute: 100
        burst: 20

    crypto:
      encryption-key: ${ENCRYPTION_KEY:32-char-dev-encryption-key-fixed}
      bcrypt-strength: 12

# Logging
logging:
  level:
    com.catalyst: DEBUG
    org.springframework.security: DEBUG
    org.springframework.kafka: INFO
    org.flywaydb: INFO

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
      group:
        liveness:
          include: ping
        readiness:
          include: db,redis
        custom:
          include: db,redis
