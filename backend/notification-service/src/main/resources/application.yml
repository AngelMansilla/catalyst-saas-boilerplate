# Catalyst Notification Service Configuration
# Phase 5: Event-Driven Notification Service

server:
  port: 8082
  servlet:
    context-path: /

spring:
  application:
    name: notification-service

  # Database Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:catalyst_db}
    username: ${DB_USERNAME:catalyst}
    password: ${DB_PASSWORD:catalyst_dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: notification
    show-sql: ${SHOW_SQL:false}
    open-in-view: false

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: notification
    baseline-on-migrate: true
    validate-on-migrate: true

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:catalyst_redis_password}
      timeout: 2000ms

  # Mail Configuration (Mailpit for dev, SES for prod)
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    from: ${MAIL_FROM:noreply@catalyst.com}
    from-name: ${MAIL_FROM_NAME:Catalyst}

  # Thymeleaf Configuration
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: ${THYMELEAF_CACHE:false}

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    consumer:
      group-id: notification-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "*"
    private-topics: # Moved here to avoid root collisions if needed, but we use catalyst prefix mostly
      user-registered: user.registered

# Catalyst Configuration (Structured to avoid IDE warnings)
catalyst:
  notification:
    kafka:
      topics:
        user-registered: user.registered
        password-reset-requested: user.password-reset-requested
        password-reset-completed: user.password-reset-completed
        subscription-created: payment.subscription.created
        payment-succeeded: payment.succeeded
        payment-failed: payment.failed
        subscription-canceled: payment.subscription.canceled
        trial-expired: payment.trial.expired

    email:
      base-url: ${EMAIL_BASE_URL:http://localhost:3000}
      logo-url: ${EMAIL_LOGO_URL:http://localhost:3000/logo.png}
      support-email: ${SUPPORT_EMAIL:support@catalyst.com}
      password-reset:
        expiration-hours: ${PASSWORD_RESET_EXPIRATION:24}

    aws:
      ses:
        region: ${AWS_SES_REGION:us-east-1}
        enabled: ${AWS_SES_ENABLED:false}
        access-key-id: ${AWS_ACCESS_KEY_ID:}
        secret-access-key: ${AWS_SECRET_ACCESS_KEY:}

  security:
    jwt:
      secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-must-be-at-least-32-chars}
      access-token-expiration: ${JWT_ACCESS_EXPIRATION:15m}
      refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:7d}
      issuer: catalyst-notification-service
    crypto:
      encryption-key: ${ENCRYPTION_KEY:your-32-char-encryption-key-here}
      bcrypt-strength: 12

# Logging
logging:
  level:
    root: INFO
    com.catalyst.notification: DEBUG
    org.springframework.kafka: INFO
    org.apache.kafka: INFO
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: ${HIBERNATE_PARAMS_LOG:WARN}

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  info:
    title: Catalyst Notification Service API
    description: Event-driven notification service with email support
    version: 0.1.0

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
      group:
        liveness:
          include: ping
        readiness:
          include: db,redis,kafka
        custom:
          include: db,redis,kafka
