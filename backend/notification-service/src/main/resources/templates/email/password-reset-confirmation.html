<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
    <div layout:fragment="content">
        <h1 style="color: #1A2B3C; margin-bottom: 16px;" 
            th:text="#{email.passwordResetConfirmation.title}">
            Password Updated
        </h1>
        
        <p th:text="#{email.passwordResetConfirmation.greeting(${userName})}">
            Hello User,
        </p>
        
        <p th:text="#{email.passwordResetConfirmation.message}">
            Your password has been successfully changed.
        </p>
        
        <div style="background-color: #FFF3CD; border-left: 4px solid #FFC107; padding: 12px; margin: 24px 0;">
            <p style="margin: 0; color: #856404;" th:text="#{email.passwordResetConfirmation.warning}">
                If you didn't make this change, please contact support immediately.
            </p>
        </div>
        
        <div style="text-align: center; margin: 32px 0;">
            <a th:href="${dashboardUrl}" 
               class="btn-primary"
               th:text="#{email.passwordResetConfirmation.cta}">
                Go to Dashboard
            </a>
        </div>
        
        <p style="margin-top: 24px;">
            <span th:text="#{email.common.regards}">Best regards,</span><br/>
            <strong th:text="#{email.common.team}">The Catalyst Team</strong>
        </p>
    </div>
</body>
</html>
